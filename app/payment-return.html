<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation paiement — Devis App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:#F3F4F6; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; -webkit-font-smoothing:antialiased; }
    .card { background:white; border-radius:24px; padding:40px 32px; max-width:440px; width:100%; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,.05),0 16px 40px rgba(0,0,0,.1); animation:fadeIn .4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .icon { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    .spin-bg   { background:#FEF3E7; }
    .green-bg  { background:#D1FAE5; }
    .red-bg    { background:#FEE2E2; }
    .orange-bg { background:#FEF3E7; }
    .spinner { width:36px; height:36px; border:3px solid #FED7AA; border-top-color:#F97316; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#1F2937; margin-bottom:8px; }
    p  { font-size:14px; color:#6B7280; line-height:1.6; }
    .plan-badge { display:inline-flex; align-items:center; gap:7px; background:#D1FAE5; color:#059669; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; padding:7px 16px; border-radius:100px; margin:16px 0; }
    .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; border:none; text-decoration:none; transition:all .2s; margin-top:12px; }
    .btn.primary { background:#F97316; color:white; box-shadow:0 4px 14px rgba(249,115,22,.35); }
    .btn.primary:hover { background:#EA6C0A; transform:translateY(-1px); }
    .btn.ghost { background:#F3F4F6; color:#6B7280; }
    .btn.ghost:hover { background:#E5E7EB; }
    .divider { height:1px; background:#F3F4F6; margin:16px 0; }
    .note { font-size:11px; color:#9CA3AF; margin-top:8px; }
    .step-list { text-align:left; margin:18px 0; display:flex; flex-direction:column; gap:8px; }
    .step { display:flex; align-items:center; gap:10px; font-size:13px; color:#374151; padding:9px 12px; background:#F9FAFB; border-radius:10px; }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot.done   { background:#10B981; }
    .dot.active { background:#F97316; animation:pulse 1.2s ease infinite; }
    .dot.wait   { background:#D1D5DB; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon spin-bg"><div class="spinner"></div></div>
  <h2>Vérification en cours…</h2>
  <p>Nous confirmons votre paiement CamPay.</p>
  <div class="step-list">
    <div class="step"><div class="dot done"></div>Paiement effectué</div>
    <div class="step"><div class="dot active"></div>Confirmation du paiement</div>
    <div class="step"><div class="dot wait"></div>Activation de votre plan</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'https://xeezdzbotsblzclnmnxg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXpkemJvdHNibHpjbG5tbnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NDk3NTQsImV4cCI6MjA4NjAyNTc1NH0.RHIGavm6M9WCR6nve1Iz_JKFeQRlpRCU2FNAr9E02PM'
)

// ── Paramètres URL envoyés par CamPay ────────────────────────────
// CamPay redirige vers : redirect_url?reference=xxx&status=SUCCESSFUL
// ou failure_redirect_url?status=failed
const urlParams   = new URLSearchParams(window.location.search)
const campayRef   = urlParams.get('reference')   // référence CamPay
const campayStatus= urlParams.get('status')       // 'SUCCESSFUL' | 'failed'

// ── Données sauvegardées avant paiement ──────────────────────────
const txRef  = sessionStorage.getItem('pending_tx_ref')
const plan   = sessionStorage.getItem('pending_plan')
const userId = sessionStorage.getItem('pending_user_id')

// ── Utilisateur connecté ─────────────────────────────────────────
const { data: { session } } = await supabase.auth.getSession()
const currentUserId = userId || session?.user?.id

async function run() {

  // CAS 1 — Échec explicite
  if (campayStatus === 'failed' || campayStatus === 'FAILED') {
    if (txRef) await supabase.from('payments').update({ status:'failed' }).eq('tx_ref', txRef)
    showError('Paiement non complété', 'Le paiement a échoué ou a été annulé.<br>Aucun montant n\'a été débité.')
    return
  }

  // CAS 2 — CamPay confirme le succès (status=SUCCESSFUL dans l'URL)
  if ((campayStatus === 'SUCCESSFUL' || campayStatus === 'successful') && txRef && currentUserId) {
    await activatePlan()
    return
  }

  // CAS 3 — Pas de params dans l'URL (popup fermé) → vérifier en BDD
  if (txRef && currentUserId) {
    const { data: payment } = await supabase
      .from('payments').select('status, plan').eq('tx_ref', txRef).single()

    if (payment?.status === 'success') {
      showSuccess(payment.plan || plan)
      clearSession()
      return
    }
    // Paiement toujours pending → tenter activation directe si référence disponible
    if (campayRef || payment?.status === 'pending') {
      await activatePlan()
      return
    }
  }

  showPending()
}

async function activatePlan() {
  // Vérifier si déjà activé (protection double appel)
  const { data: existing } = await supabase
    .from('payments').select('status, plan').eq('tx_ref', txRef).single()

  if (existing?.status === 'success') {
    showSuccess(existing.plan || plan)
    clearSession()
    return
  }

  const planToActivate = plan || existing?.plan
  if (!planToActivate || !currentUserId) {
    showError('Plan introuvable', 'Contactez le support avec la référence : <strong>' + (txRef||'N/A') + '</strong>')
    return
  }

  // Activer via RPC PostgreSQL
  const { error } = await supabase.rpc('activate_plan', {
    p_user_id: currentUserId,
    p_plan:    planToActivate,
    p_tx_ref:  txRef
  })

  if (error) {
    // Fallback : mise à jour manuelle
    const expires = planToActivate === 'monthly'
      ? new Date(Date.now() + 30*24*60*60*1000).toISOString()
      : new Date(Date.now() + 365*24*60*60*1000).toISOString()

    await supabase.from('payments').update({
      status: 'success',
      verified_at: new Date().toISOString(),
      flw_ref: campayRef || ''
    }).eq('tx_ref', txRef)

    await supabase.from('profiles').update({
      plan:            planToActivate,
      plan_started_at: new Date().toISOString(),
      plan_expires_at: expires,
      quotes_count:    0,
      quotes_reset_at: new Date().toISOString()
    }).eq('id', currentUserId)
  }

  clearSession()
  showSuccess(planToActivate)
}

function clearSession() {
  sessionStorage.removeItem('pending_plan')
  sessionStorage.removeItem('pending_tx_ref')
  sessionStorage.removeItem('pending_user_id')
}

function showSuccess(p) {
  const names  = { monthly:'Mensuel', annual:'Annuel' }
  const limits = { monthly:'50 devis / mois', annual:'50 devis / mois · 1 an' }
  document.getElementById('card').innerHTML = `
    <div class="icon green-bg">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Plan activé ! 🎉</h2>
    <p>Votre abonnement est maintenant actif.</p>
    <div class="plan-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Plan ${names[p]||p} — ${limits[p]||''}
    </div>
    <div class="divider"></div>
    <p>Redirection automatique dans quelques secondes…</p>
    <a href="dashboard.html" class="btn primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Aller au tableau de bord
    </a>
  `
  setTimeout(() => { window.location.href = 'dashboard.html' }, 3500)
}

function showPending() {
  document.getElementById('card').innerHTML = `
    <div class="icon orange-bg">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <h2>Confirmation en attente</h2>
    <p>Votre paiement est en cours de validation.<br>Cela prend généralement moins d'une minute.</p>
    <a href="javascript:location.reload()" class="btn primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Vérifier à nouveau
    </a>
    <a href="dashboard.html" class="btn ghost">Retour au tableau de bord</a>
    <p class="note">Réf : ${txRef || 'N/A'}</p>
  `
}

function showError(title, msg) {
  document.getElementById('card').innerHTML = `
    <div class="icon red-bg">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h2>${title}</h2>
    <p>${msg}</p>
    <a href="dashboard.html" class="btn primary">Retour au tableau de bord</a>
  `
}

run()
</script>
</body>
</html>
