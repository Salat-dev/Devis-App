<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Webhook CamPay</title>
</head>
<body>
<script type="module">
// ═══════════════════════════════════════════════════════════════
// payment-notify.html — Webhook CamPay
//
// CamPay envoie une requête POST à webhook_url avec les données :
//   reference       : référence CamPay de la transaction
//   external_reference : votre tx_ref (ex: DEVIS-MONTHLY-xxx)
//   status          : 'SUCCESSFUL' | 'FAILED'
//   amount          : montant
//   operator        : 'MTN' | 'ORANGE'
//   phone           : numéro du payeur
//
// Puisqu'on est sur hébergement statique (Vercel), CamPay envoie
// aussi les paramètres en GET dans l'URL → on les lit des deux façons.
// ═══════════════════════════════════════════════════════════════

import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'https://xeezdzbotsblzclnmnxg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXpkemJvdHNibHpjbG5tbnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NDk3NTQsImV4cCI6MjA4NjAyNTc1NH0.RHIGavm6M9WCR6nve1Iz_JKFeQRlpRCU2FNAr9E02PM'
)

// Lire les paramètres de l'URL (GET fallback pour hébergement statique)
const p = new URLSearchParams(window.location.search)
const status    = p.get('status')             // 'SUCCESSFUL' | 'FAILED'
const txRef     = p.get('external_reference') // votre référence interne
const campayRef = p.get('reference')          // référence CamPay
const operator  = p.get('operator') || ''
const phone     = p.get('phone') || ''

async function processWebhook() {
  if (!txRef) {
    document.body.innerHTML = 'OK — no reference'
    return
  }

  if (status === 'SUCCESSFUL' || status === 'successful') {
    // Vérifier si déjà traité
    const { data: existing } = await supabase
      .from('payments').select('status, plan, user_id').eq('tx_ref', txRef).single()

    if (!existing || existing.status === 'success') {
      document.body.innerHTML = 'OK — already processed'
      return
    }

    // Activer le plan
    const { error } = await supabase.rpc('activate_plan', {
      p_user_id: existing.user_id,
      p_plan:    existing.plan,
      p_tx_ref:  txRef
    })

    if (error) {
      // Fallback manuel
      const expires = existing.plan === 'monthly'
        ? new Date(Date.now() + 30*24*60*60*1000).toISOString()
        : new Date(Date.now() + 365*24*60*60*1000).toISOString()

      await supabase.from('payments').update({
        status:      'success',
        verified_at: new Date().toISOString(),
        flw_ref:     campayRef || ''
      }).eq('tx_ref', txRef)

      await supabase.from('profiles').update({
        plan:            existing.plan,
        plan_started_at: new Date().toISOString(),
        plan_expires_at: expires,
        quotes_count:    0,
        quotes_reset_at: new Date().toISOString()
      }).eq('id', existing.user_id)
    }

    document.body.innerHTML = 'OK'

  } else if (status === 'FAILED' || status === 'failed') {
    await supabase.from('payments').update({ status:'failed' }).eq('tx_ref', txRef)
    document.body.innerHTML = 'OK'
  } else {
    document.body.innerHTML = 'OK — unhandled status: ' + status
  }
}

processWebhook()
</script>
</body>
</html>
