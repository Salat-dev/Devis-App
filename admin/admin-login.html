<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#012B2A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="afrivis.">
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
    <link rel="icon" type="image/x-icon" href="../icons/favicon.svg">

  <title>Admin — Connexion | afrivis.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       afrivis. — Design System (Login)
       Primary #012B2A | Accent #CCAA01 | BG #FFFFFF
    ═══════════════════════════════════════════════ */
    :root {
      --primary:      #012B2A;
      --primary-h:    #013534;
      --primary-90:   rgba(1,43,42,0.90);
      --primary-12:   rgba(1,43,42,0.12);
      --primary-08:   rgba(1,43,42,0.08);
      --primary-06:   rgba(1,43,42,0.06);
      --primary-04:   rgba(1,43,42,0.04);
      --accent:       #CCAA01;
      --accent-d:     #B09600;
      --accent-l:     #FAF5D7;
      --accent-12:    rgba(204,170,1,0.12);
      --accent-22:    rgba(204,170,1,0.22);
      --white:        #FFFFFF;
      --surface:      #F7F8F6;
      --surface-2:    #F0F2EF;
      --border:       rgba(1,43,42,0.10);
      --border-md:    rgba(1,43,42,0.16);
      --t1:           #012B2A;
      --t2:           rgba(1,43,42,0.62);
      --t3:           rgba(1,43,42,0.40);
      --t4:           rgba(1,43,42,0.28);
      --green:        #0D7A5F;
      --green-bg:     #E6F5F1;
      --red:          #C53030;
      --red-bg:       #FEF2F2;
      --blue:         #1D6FA4;
      --amber:        #B45309;
    
      --fd: 'Manrope', sans-serif;
      --fb: 'Inter', sans-serif;
    
      --sh-sm:  0 1px 2px rgba(1,43,42,0.04), 0 2px 8px rgba(1,43,42,0.04);
      --sh-md:  0 2px 4px rgba(1,43,42,0.05), 0 8px 24px rgba(1,43,42,0.08);
      --sh-lg:  0 4px 8px rgba(1,43,42,0.05), 0 16px 48px rgba(1,43,42,0.10);
    
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-pill: 100px;
      --ease: cubic-bezier(0.16,1,0.3,1);
      --tr: all 0.22s var(--ease);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: var(--fb);
      background: var(--surface);
      color: var(--t1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      position: relative;
    }
    
    /* Subtle pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 10% 20%, rgba(1,43,42,0.02) 0%, transparent 30%),
                        radial-gradient(circle at 90% 80%, rgba(204,170,1,0.02) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .login-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s var(--ease) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .brand img {
      height: 48px;
      width: auto;
      display: block;
    }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: var(--primary-08);
      border: 1px solid var(--primary-12);
      border-radius: var(--r-pill);
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-left: 8px;
      white-space: nowrap;
    }
    .brand-badge svg { color: var(--accent); }
    
    /* Card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 36px;
      box-shadow: var(--sh-lg);
    }
    .card-title {
      font-family: var(--fd);
      font-size: 20px;
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--t3);
      margin-bottom: 28px;
    }
    
    /* Fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--t4);
      pointer-events: none;
      transition: color 0.2s;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 14px 12px 42px;
      font-family: var(--fb);
      font-size: 14px;
      color: var(--t1);
      outline: none;
      transition: var(--tr);
    }
    input::placeholder { color: var(--t4); }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-12);
    }
    input:focus + .field-icon,
    .field-wrap:focus-within .field-icon {
      color: var(--primary);
    }
    
    /* Error */
    .field-error {
      font-size: 11px;
      color: var(--red);
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .field-error.show { display: flex; }
    
    /* Button */
    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: var(--r-md);
      border: none;
      background: var(--primary);
      color: var(--white);
      font-family: var(--fb);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(1,43,42,0.25);
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-login:hover {
      background: var(--primary-h);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(1,43,42,0.3);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Security note */
    .security-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 10px 14px;
      background: var(--red-bg);
      border: 1px solid rgba(197,48,48,0.15);
      border-radius: var(--r-md);
      font-size: 11px;
      color: var(--t3);
    }
    .security-note svg {
      color: var(--red);
      flex-shrink: 0;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 18px;
      box-shadow: var(--sh-lg);
      font-family: var(--fb);
      font-size: 13px;
      font-weight: 500;
      color: var(--t1);
      z-index: 999;
      max-width: 360px;
      animation: toastIn 0.3s var(--ease);
    }
    .toast.error .toast-icon { background: var(--red-bg); color: var(--red); }
    .toast-icon {
      width: 30px; height: 30px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .toast-message { flex: 1; word-break: break-word; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 24px; }
      .brand img { height: 40px; }
      .brand-badge { font-size: 10px; padding: 3px 8px; }
      .toast { bottom: 20px; right: 20px; max-width: calc(100vw - 40px); }
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <!-- Brand avec logo -->
  <div class="brand">
    <img src="../public/logo/Logo secondaire.svg" alt="afrivis.">
    <span class="brand-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Super Admin
    </span>
  </div>

  <div class="card">
    <div class="card-title">Accès restreint</div>
    <div class="card-sub">Connectez-vous avec un compte super administrateur</div>

    <div class="field">
      <label>Email administrateur</label>
      <div class="field-wrap">
        <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="adminEmail" placeholder="admin@afrivis.com" autocomplete="email">
      </div>
      <div class="field-error" id="errEmail">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Email invalide
      </div>
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <div class="field-wrap">
        <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" id="adminPwd" placeholder="••••••••••" autocomplete="current-password">
      </div>
      <div class="field-error" id="errPwd">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Mot de passe requis
      </div>
    </div>

    <button class="btn-login" id="loginBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Connexion Admin
    </button>

    <div class="security-note">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Accès réservé aux super administrateurs. Toute tentative non autorisée est enregistrée.
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'https://xeezdzbotsblzclnmnxg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXpkemJvdHNibHpjbG5tbnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NDk3NTQsImV4cCI6MjA4NjAyNTc1NH0.RHIGavm6M9WCR6nve1Iz_JKFeQRlpRCU2FNAr9E02PM'
)

/* ── Toast amélioré ── */
function showToast(message, type = 'error') {
  const existing = document.querySelector('.toast')
  if (existing) existing.remove()
  const toast = document.createElement('div')
  toast.className = `toast ${type}`
  const icon = document.createElement('div')
  icon.className = 'toast-icon'
  icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  const msg = document.createElement('span')
  msg.className = 'toast-message'
  msg.textContent = message
  toast.appendChild(icon)
  toast.appendChild(msg)
  document.body.appendChild(toast)
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300) }, 4000)
}

/* Vérifier si déjà connecté */
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) return
  const { data: adm } = await supabase.from('admins').select('id').eq('id', session.user.id).single()
  if (adm) window.location.href = 'admin-dashboard.html'
}
checkSession()

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('adminEmail').value.trim()
  const pwd = document.getElementById('adminPwd').value

  // Réinitialiser les erreurs
  document.getElementById('errEmail').classList.remove('show')
  document.getElementById('errPwd').classList.remove('show')

  // Validation simple
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('errEmail').classList.add('show')
    return
  }
  if (!pwd) {
    document.getElementById('errPwd').classList.add('show')
    return
  }

  const btn = document.getElementById('loginBtn')
  btn.disabled = true
  btn.innerHTML = `<span class="spinner"></span> Vérification...`

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd })
  if (error) {
    btn.disabled = false
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Connexion Admin`
    showToast('Email ou mot de passe incorrect.')
    return
  }

  // Vérifier dans la table admins
  const { data: adm, error: admErr } = await supabase.from('admins').select('id').eq('id', data.user.id).single()
  if (admErr || !adm) {
    await supabase.auth.signOut()
    btn.disabled = false
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Connexion Admin`
    showToast('Accès refusé. Compte non administrateur.')
    return
  }

  // Redirection
  window.location.href = 'admin-dashboard.html'
})

// Appuyer sur Entrée déclenche la connexion
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click()
})
</script>
</body>
</html>
